<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Le Royal Monaco — Haute Gastronomie</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500&family=Outfit:wght@200;300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="grain"></div>

  <nav class="site-nav" id="site-nav" aria-label="Pages" hidden>
    <div class="nav__inner">
      <a href="#" class="nav__logo">Le Royal</a>
      <div class="nav__links">
        <a href="#index" class="site-nav__link" data-page="index">Accueil</a>
        <a href="#carte" class="site-nav__link" data-page="carte">La Carte</a>
        <a href="#private" class="site-nav__link" data-page="private">Privatisation</a>
      </div>
    </div>
  </nav>

  <main>

    <!-- ════════════════ HERO ════════════════ -->
    <header data-section="hero">
      <div class="hero" data-cms-media="videoLoop">
        <div data-cms-render class="hero__video-wrap"></div>
        <div class="hero__overlay"></div>
      </div>
      <div class="hero__content" data-anim="fade-up">
        <div class="hero__star">&#10038;</div>
        <p class="hero__eyebrow" data-cms-field="eyebrow">Monaco — Haute Gastronomie</p>
        <h1 class="hero__title" data-cms-field="title"></h1>
        <p class="hero__subtitle" data-cms-field="subtitle"></p>
        <a class="hero__cta" href="#reservation" data-cms-field="cta">Réserver une table</a>
        <div class="hero__scroll">
          <span>Découvrir</span>
          <div class="hero__scroll-line"></div>
        </div>
      </div>
    </header>

    <!-- ════════════════ AMBIANCE (video loop) ════════════════ -->
    <section data-section="ambiance">
      <div class="ambiance">
        <div class="ambiance__media" data-cms-media="videoLoop">
          <div data-cms-render></div>
          <div class="ambiance__overlay"></div>
        </div>
        <div class="ambiance__content" data-anim="fade-up">
          <div class="ambiance__rule"></div>
          <h2 class="ambiance__title" data-cms-field="title"></h2>
          <p class="ambiance__text" data-cms-field="text"></p>
          <div class="ambiance__rule"></div>
        </div>
      </div>
    </section>

    <!-- ════════════════ ABOUT ════════════════ -->
    <section data-section="about">
      <div class="about">
        <div class="about__inner">
          <div class="about__media" data-cms-media="image" data-anim="fade-right">
            <div data-cms-render></div>
          </div>
          <div class="about__text" data-anim="fade-left">
            <p class="about__eyebrow" data-cms-field="eyebrow">Notre histoire</p>
            <h2 class="about__title" data-cms-field="title"></h2>
            <div class="about__divider"></div>
            <p class="about__body" data-cms-field="text"></p>
            <p class="about__signature" data-cms-field="signature"></p>
          </div>
        </div>
      </div>
    </section>

    <!-- ════════════════ EXPERIENCE (playable video) ════════════════ -->
    <section data-section="experience">
      <div class="experience">
        <div class="experience__inner" data-anim="fade-up">
          <p class="experience__eyebrow" data-cms-field="eyebrow">L'expérience</p>
          <h2 class="experience__title" data-cms-field="title"></h2>
          <div class="experience__player" data-cms-media="video" data-cms-poster="poster">
            <div class="experience__glow"></div>
            <div data-cms-render></div>
          </div>
        </div>
      </div>
    </section>

    <!-- ════════════════ OFFER ════════════════ -->
    <section data-section="offer">
      <div class="offer">
        <div class="offer__inner">
          <div class="offer__text" data-anim="fade-right">
            <p class="offer__eyebrow" data-cms-field="eyebrow">Offre exclusive</p>
            <h2 class="offer__title" data-cms-field="title"></h2>
            <div class="offer__divider"></div>
            <p class="offer__body" data-cms-field="text"></p>
            <a class="offer__cta" href="#reservation" data-cms-field="cta">Réserver</a>
          </div>
          <div class="offer__media" data-cms-media="image" data-anim="fade-left">
            <div data-cms-render></div>
          </div>
        </div>
      </div>
    </section>

    <!-- ════════════════ MENU / PRICING ════════════════ -->
    <section data-section="menu">
      <div class="menu">
        <div class="menu__header" data-anim="fade-up">
          <p class="menu__eyebrow" data-cms-field="eyebrow">La Carte</p>
          <h2 class="menu__title" data-cms-field="title"></h2>
          <p class="menu__subtitle" data-cms-field="subtitle"></p>
        </div>
        <div class="menu__grid" data-cms-list="items" data-anim="fade-up"></div>
        <template data-cms-card="items">
          <div class="menu-card">
            <span class="menu-card__price" data-cms-card-field="price"></span>
            <h3 class="menu-card__title" data-cms-card-field="title"></h3>
            <p class="menu-card__desc" data-cms-card-field="description"></p>
          </div>
        </template>
      </div>
    </section>

    <!-- ════════════════ GALLERY (image) ════════════════ -->
    <section data-section="gallery">
      <div class="gallery">
        <div class="gallery__media" data-cms-media="image">
          <div data-cms-render></div>
          <div class="gallery__overlay"></div>
        </div>
        <div class="gallery__content" data-anim="fade-up">
          <h2 class="gallery__title" data-cms-field="title"></h2>
          <p class="gallery__text" data-cms-field="text"></p>
        </div>
      </div>
    </section>

    <!-- ════════════════ TESTIMONIALS ════════════════ -->
    <section data-section="testimonials">
      <div class="testimonials">
        <div class="testimonials__header" data-anim="fade-up">
          <p class="testimonials__eyebrow" data-cms-field="eyebrow">Témoignages</p>
          <h2 class="testimonials__title" data-cms-field="title"></h2>
        </div>
        <div class="testimonials__grid" data-cms-list="items" data-anim="fade-up"></div>
        <template data-cms-card="items">
          <div class="testimonial-card">
            <div class="testimonial-card__stars">&#9733;&#9733;&#9733;&#9733;&#9733;</div>
            <p class="testimonial-card__quote" data-cms-card-field="quote"></p>
            <div class="testimonial-card__footer">
              <span class="testimonial-card__author" data-cms-card-field="author"></span>
              <span class="testimonial-card__role" data-cms-card-field="role"></span>
            </div>
          </div>
        </template>
      </div>
    </section>

    <!-- ════════════════ FAQ ════════════════ -->
    <section data-section="faq">
      <div class="faq">
        <div class="faq__header" data-anim="fade-up">
          <p class="faq__eyebrow" data-cms-field="eyebrow">FAQ</p>
          <h2 class="faq__title" data-cms-field="title"></h2>
        </div>
        <div class="faq__grid" data-cms-list="items" data-anim="fade-up"></div>
        <template data-cms-card="items">
          <div class="faq-card">
            <h3 class="faq-card__question" data-cms-card-field="question"></h3>
            <p class="faq-card__answer" data-cms-card-field="answer"></p>
          </div>
        </template>
      </div>
    </section>

    <!-- ════════════════ RESERVATION / CONTACT ════════════════ -->
    <section data-section="reservation">
      <div class="reservation">
        <div class="reservation__bg" data-cms-media="image">
          <div data-cms-render></div>
          <div class="reservation__overlay"></div>
        </div>
        <div class="reservation__inner" data-anim="fade-up">
          <div class="reservation__star">&#10038;</div>
          <h2 class="reservation__title" data-cms-field="title"></h2>
          <p class="reservation__text" data-cms-field="text"></p>
          <p class="reservation__phone-row">
            <span class="reservation__phone-label">Réservations —</span>
            <span class="reservation__phone" data-cms-field="phone"></span>
          </p>
          <p class="reservation__email-row">
            <span class="reservation__email-label">Email —</span>
            <span class="reservation__email" data-cms-field="email"></span>
          </p>
          <a class="reservation__cta" href="#" data-cms-field="cta" data-cms-href="email">Réserver par email</a>
          <p class="reservation__address" data-cms-field="address"></p>
        </div>
      </div>
    </section>

  </main>

  <footer class="footer">
    <div class="footer__inner">
      <span class="footer__logo">Le Royal Monaco</span>
      <p class="footer__copy">&copy; 2026 Le Royal Monaco — Tous droits réservés</p>
    </div>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
